name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint, type-check & unit test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt && pip install -e .
      - run: ruff check src tests
      - run: black --check src tests
      - run: mypy src
      - run: pytest -m "not pipeline" --cov=retail_platform --cov-report=term

  pipeline:
    name: End-to-end platform run (synthetic data)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt && pip install -e .
      - run: pytest -m pipeline -s
